services:
  ollama:
    image: ollama/ollama:latest
    container_name: wawd-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# After first start, pull the model:
#   docker exec wawd-ollama ollama pull qwen2.5:3b

volumes:
  ollama_data:
